<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zootopia</title>
    <link rel="stylesheet" href="Styles/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <div class="logo">Zootopia</div>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#info">Información</a></li>
                <li><a href="#formulario">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>Contáctanos</h1>
            <p>Estamos aquí para ayudarte.</p>
        </div>
    </section>

    <!-- INFO -->
    <section id="info" class="products">
        <h2>Información de Contacto</h2>

        <div class="cards">

            <div class="card">
                <h3>Dirección</h3>
                <p>Calle Principal #123</p>
            </div>

            <div class="card">
                <h3>Teléfono</h3>
                <p>+1 (809) 123-4567</p>
            </div>

            <div class="card">
                <h3>Email</h3>
                <p>contacto@zootopia.com</p>
            </div>

            <div class="card">
                <h3>Horario</h3>
                <p>Lunes a Viernes<br>9:00 AM - 5:00 PM</p>
            </div>

        </div>
    </section>

    <!-- FORMULARIO -->
    <section id="formulario" class="about">
        <div class="about-text">
            <h2>Envíanos un mensaje</h2>

            <form id="formContacto">
                <input type="text" placeholder="Nombre completo" required>
                <input type="email" placeholder="Correo electrónico" required>
                <textarea placeholder="Escribe tu mensaje aquí..." rows="4" required></textarea>
                <button type="submit">Enviar mensaje</button>
            </form>

            <p id="mensajeContacto"></p>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Zootopia</p>
    </footer>

    <script src="Js/home.js"></script>

</body>
</html>
